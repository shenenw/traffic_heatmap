# File: hourly-traffic.yml
# Date: June 10, 2026
# Name: pkd
# Description: GitHub Actions workflow to run the Edmonton traffic fetch script 
#              once every hour using a cron schedule.

name: Hourly Edmonton Traffic Fetch

on:
  schedule:
    # Runs at minute 0 of every hour
    - cron: '0 * * * *'
  workflow_dispatch: # Allows you to manually trigger the script anytime from the GitHub UI

jobs:
  run-fetch-script:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/actions-setup@v3 # Using stable action setup for runner environments
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run Fetch Script
      env:
        # Pass your hidden secret into the script's environment
        EDMONTON_APP_TOKEN: ${{ secrets.EDMONTON_APP_TOKEN }}
      run: python bus-api.py
