# File: hourly-traffic.yml
# Date: June 10, 2026
# Name: pkd
# Description: GitHub Actions workflow to run the Edmonton transit position script,
#              generate an interactive leafet heatmap, and commit it back to the repo.

name: Hourly Edmonton Traffic Fetch

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-fetch-script:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests folium branca

    - name: Run Fetch Script and Generate Heatmap
      env:
        EDMONTON_APP_TOKEN: ${{ secrets.EDMONTON_APP_TOKEN }}
      run: python bus-api.py

    - name: Commit and Push index.html
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add index.html
        git diff-index --quiet HEAD || git commit -m "Automated hourly traffic heatmap update"
        git push
