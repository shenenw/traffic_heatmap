name: Collect Realtime Bus
on:
  schedule:
    # Runs at 7 minutes past every hour (UTC) to avoid peak load times
    - cron: '7 * * * *'
  workflow_dispatch: # Allows manual triggering

jobs:
  run-script:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # Prevents hanging jobs

    permissions:
      contents: write

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v5  # Node.js 24 compatible

    - name: Set up Python
      uses: actions/setup-python@v6  # Node.js 24 compatible
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests folium python-dotenv branca jinja2 gtfs-realtime-bindings protobuf

    - name: Run data collection script
      id: collect
      env:
        EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        EMAIL_TO: ${{ secrets.EMAIL_TO }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      run: |
        python collect-realtime.py
        echo "exit_code=$?" >> $GITHUB_OUTPUT

    - name: Commit and Push changes
      if: success()  # Only runs if script succeeded
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add bus_realtime_history.json index.html
        
        # Only commit if there are actual changes
        if git diff-index --quiet HEAD; then
          echo "✓ No changes to commit"
        else
          git commit -m "Automated hourly bus traffic update"
          git push
          echo "✓ Changes committed and pushed"
        fi

    - name: Notify on failure
      if: failure()
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: '⚠️ Workflow Failed: Collect Realtime Bus',
            body: `The scheduled workflow failed at ${new Date().toISOString()}.\n\nCheck the logs: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
          })