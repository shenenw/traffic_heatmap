name: Collect Realtime Bus
on:
  schedule:
    # This runs the script automatically at the start of every hour (UTC)
    - cron: '0 * * * *'
  workflow_dispatch: # Allows you to also trigger it manually with a button click

jobs:
  run-script:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Allows GitHub to save the updated JSON and HTML maps back to your repo

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/checkout@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests folium python-dotenv branca jinja2 gtfs-realtime-bindings
    - name: Run data collection script
      env:
        # Passes your secret email credentials securely into the script environment
        EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        EMAIL_TO: ${{ secrets.EMAIL_TO }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      run: |
        python collect-realtime.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add bus_realtime_history.json index.html
        # Only commit if there are actual updates to the tracking history
        git diff-index --quiet HEAD || git commit -m "Automated hourly bus traffic update [skip ci]"
        git push
